<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <title>Lappland's Tavern</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        /* ===== Hero 头图（与文章页保持一致的 60vh）===== */
        .hero {
            width: 100%;
            height: 18vh;
            background: url("./images/head.PNG") center/cover no-repeat;
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.35);
        }
        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #efecff;
            z-index: 1;
        }
        .hero-content h1 {
            font-size: 3rem;
            margin: 0;
        }
        .hero-content p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin: 0.5rem 0 0;
        }

        /* ===== 文章列表区域 ===== */
        .post-list {
            max-width: 800px;
            margin: -1vh auto 60px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .post-card {
            background: #fff;
            padding: 24px 28px;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.18);
        }
        .post-card h2 {
            margin: 0 0 8px;
            font-size: 1.6rem;
            color: #222;
        }
        .post-card .meta {
            font-size: 0.9rem;
            color: #777;
        }
        .post-card .excerpt {
            margin: 10px 0 0;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 头图 -->
    <div class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Lappland's Tavern</h1>
            <p>副标题</p>
        </div>
    </div>

    <!-- 文章列表卡片 -->
    <div class="post-list">

        <a href="./posts/pin.html" class="post-card">
            <h2>置顶页</h2>
            <div class="meta">2026-06-18</div>
            <p class="excerpt">置顶页面</p>
        </a>

        <a href="./posts/hello-world.html" class="post-card">
            <h2>hello world</h2>
            <div class="meta">2026-06-18 12:17:42</div>
            <p class="excerpt">测试</p>
        </a>


        <a href="./posts/202508262317.html" class="post-card">
            <div class="meta">2025-08-26 23:17</div>
            <p class="excerpt">这之前的日子就这样画上句号，只要把每一天当成是做梦就好。</p>
        </a>


        

        <!-- 可以继续复制卡片添加更多文章 -->
    </div>
</body>
</html>
